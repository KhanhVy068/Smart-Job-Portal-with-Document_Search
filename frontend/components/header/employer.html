<header id="headerEl" class="fixed left-64 right-0 top-0 z-30 flex h-16 items-center justify-between border-b border-slate-200 bg-white px-4 shadow-sm transition-all duration-300 sm:px-6">
  <div class="flex min-w-0 flex-1 items-center gap-4">
    <div class="flex min-w-0 items-center gap-2">
      <div id="headerBrandLogo" class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-blue-600 text-white">
        <span class="material-symbols-outlined text-xl">rocket_launch</span>
      </div>
      <div class="min-w-0">
        <p id="headerBrandName" class="truncate text-lg font-black tracking-tight text-slate-950">Smart Job Portal</p>
        <p id="headerCompanyName" class="hidden truncate text-xs font-bold text-slate-400 sm:block">Đang tải thông tin công ty...</p>
      </div>
    </div>
  </div>

  <div class="relative flex items-center gap-2 sm:gap-3">
    <button id="headerMessagesButton" class="relative flex h-10 w-10 items-center justify-center rounded-lg text-slate-500 transition-colors hover:bg-slate-50 hover:text-blue-600" type="button" title="Tin nhắn">
      <span class="material-symbols-outlined text-xl">mail</span>
      <span id="headerMessagesBadge" class="absolute right-2 top-2 hidden h-2.5 w-2.5 rounded-full border-2 border-white bg-blue-600"></span>
    </button>

    <button id="headerNotificationsButton" class="relative flex h-10 w-10 items-center justify-center rounded-lg text-slate-500 transition-colors hover:bg-slate-50 hover:text-blue-600" type="button" title="Thông báo">
      <span class="material-symbols-outlined text-xl">notifications</span>
      <span id="headerNotificationsBadge" class="absolute right-2 top-2 hidden h-2.5 w-2.5 rounded-full border-2 border-white bg-red-500"></span>
    </button>

    <div class="mx-1 h-8 w-px bg-slate-200"></div>

    <button id="headerProfileButton" class="flex min-w-0 items-center gap-3 rounded-lg px-2 py-1.5 transition-colors hover:bg-slate-50" type="button" title="Menu tài khoản">
      <div class="hidden min-w-0 text-right sm:block">
        <p id="headerUserName" class="max-w-40 truncate text-sm font-black leading-none text-slate-950">Đang tải...</p>
        <p id="headerUserRole" class="mt-1 max-w-40 truncate text-[10px] font-black uppercase tracking-wider text-slate-400">Nhà tuyển dụng</p>
      </div>
      <div id="headerAvatar" class="flex h-9 w-9 shrink-0 items-center justify-center overflow-hidden rounded-full border border-slate-200 bg-slate-100 text-xs font-black text-slate-500">
        <span class="material-symbols-outlined text-lg">person</span>
      </div>
    </button>

    <div id="headerDropdown" class="absolute right-0 top-12 hidden w-80 rounded-xl border border-slate-200 bg-white p-4 shadow-xl shadow-slate-200/70">
      <div class="flex items-start gap-3">
        <div id="headerDropdownIcon" class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-slate-100 text-slate-500">
          <span class="material-symbols-outlined text-xl">info</span>
        </div>
        <div class="min-w-0">
          <h2 id="headerDropdownTitle" class="text-sm font-black text-slate-950">Thông tin</h2>
          <p id="headerDropdownMessage" class="mt-1 text-sm font-semibold leading-6 text-slate-500">
            Dữ liệu sẽ hiển thị khi backend sẵn sàng.
          </p>
        </div>
      </div>
    </div>

    <div id="headerProfileDropdown" class="absolute right-0 top-12 hidden w-96 max-w-[calc(100vw-2rem)] rounded-xl border border-slate-200 bg-white p-3 shadow-xl shadow-slate-200/70">
      <div class="mb-2 flex items-center gap-3 rounded-lg px-3 py-3">
        <div id="headerMenuAvatar" class="flex h-12 w-12 shrink-0 items-center justify-center overflow-hidden rounded-full bg-slate-100 text-sm font-black text-slate-600">
          <span class="material-symbols-outlined">person</span>
        </div>
        <div class="min-w-0">
          <p id="headerMenuUserName" class="truncate text-base font-black text-slate-950">Chưa có dữ liệu</p>
          <p id="headerMenuUserMeta" class="mt-1 truncate text-sm font-semibold text-slate-400">Nhà tuyển dụng</p>
        </div>
      </div>

      <button id="headerMenuNotificationsButton" class="headerMenuItem flex w-full items-center gap-4 rounded-lg px-3 py-3 text-left transition-colors hover:bg-slate-50" type="button">
        <span class="flex min-w-0 items-center gap-4">
          <span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-slate-100 text-slate-950">
            <span class="material-symbols-outlined">notifications</span>
          </span>
          <span class="truncate text-base font-black text-slate-950">Thông báo</span>
        </span>
      </button>

      <button class="headerMenuItem flex w-full items-center gap-4 rounded-lg px-3 py-3 text-left transition-colors hover:bg-slate-50" type="button" data-route="settings">
        <span class="flex min-w-0 items-center gap-4">
          <span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-slate-100 text-slate-950">
            <span class="material-symbols-outlined">settings</span>
          </span>
          <span class="truncate text-base font-black text-slate-950">Cài đặt</span>
        </span>
      </button>

      <button id="headerLogoutButton" class="headerMenuItem flex w-full items-center gap-4 rounded-lg px-3 py-3 text-left transition-colors hover:bg-red-50" type="button">
        <span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-slate-100 text-slate-950">
          <span class="material-symbols-outlined">logout</span>
        </span>
        <span class="truncate text-base font-black text-slate-950">Đăng xuất</span>
      </button>
    </div>
  </div>
</header>
