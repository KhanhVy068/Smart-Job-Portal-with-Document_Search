
<!-- ADMIN HEADER -->
<header id="headerEl" class="fixed left-64 right-0 top-0 z-30 grid h-16 grid-cols-[auto_minmax(180px,1fr)_auto] items-center gap-4 border-b border-slate-200 bg-white px-4 shadow-sm transition-all duration-300 sm:px-6">
  <div class="flex min-w-0 items-center gap-3">
    <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-blue-600 text-white">
      <span class="material-symbols-outlined text-xl">admin_panel_settings</span>
    </div>

    <div class="hidden min-w-0 sm:block">
      <p class="truncate text-lg font-black tracking-tight text-slate-950">Smart Job Portal</p>
      <p class="truncate text-xs font-bold text-slate-400">Không gian quản trị</p>
    </div>
  </div>

  

  <div class="relative flex items-center justify-end gap-2">
    <button class="hidden h-10 items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 text-sm font-bold text-slate-700 transition-colors hover:bg-slate-50 lg:inline-flex" type="button" data-route="users" title="Users">
      <span class="material-symbols-outlined text-xl">group_add</span>
      <span>Người dùng</span>
    </button>

    <button class="hidden h-10 items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 text-sm font-bold text-slate-700 transition-colors hover:bg-slate-50 lg:inline-flex" type="button" data-route="reports" title="Reports">
      <span class="material-symbols-outlined text-xl">ios_share</span>
      <span>Báo cáo</span>
    </button>

    <button id="adminNotificationsButton" class="relative flex h-10 w-10 items-center justify-center rounded-lg text-slate-500 transition-colors hover:bg-slate-50 hover:text-blue-600" type="button" title="Notifications">
      <span class="material-symbols-outlined text-xl">notifications</span>
      <span id="adminNotificationsBadge" class="absolute right-2 top-2 hidden h-2.5 w-2.5 rounded-full border-2 border-white bg-red-500"></span>
    </button>

    <button id="adminProfileButton" class="flex h-10 min-w-0 items-center gap-2 rounded-lg px-2 transition-colors hover:bg-slate-50" type="button" title="Profile người dùng" aria-expanded="false">
      <div id="adminHeaderAvatar" class="flex h-9 w-9 shrink-0 items-center justify-center overflow-hidden rounded-full bg-slate-100 text-xs font-black text-slate-600">
        <span class="material-symbols-outlined text-lg">admin_panel_settings</span>
      </div>
      <div class="hidden min-w-0 text-left xl:block">
        <p id="adminHeaderName" class="max-w-36 truncate text-sm font-black leading-none text-slate-950">Admin</p>
        <p id="adminHeaderEmail" class="mt-1 max-w-36 truncate text-[11px] font-bold text-slate-400">admin</p>
      </div>
      <span class="material-symbols-outlined hidden text-xl text-slate-400 sm:block">expand_more</span>
    </button>

    <div id="adminNotificationDropdown" class="absolute right-14 top-12 hidden w-80 rounded-xl border border-slate-200 bg-white p-4 shadow-xl shadow-slate-200/70">
      <div class="flex items-start gap-3">
        <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-blue-50 text-blue-600">
          <span class="material-symbols-outlined text-xl">notifications</span>
        </div>
        <div class="min-w-0">
          <h2 class="text-sm font-black text-slate-950">Thông báo</h2>
          <p id="adminNotificationMessage" class="mt-1 text-sm font-semibold leading-6 text-slate-500">Không có thông báo mới.</p>
        </div>
      </div>
    </div>

    <div id="adminProfileDropdown" class="absolute right-0 top-12 hidden w-80 max-w-[calc(100vw-2rem)] overflow-hidden rounded-xl border border-slate-200 bg-white shadow-xl shadow-slate-200/70">
      <div class="border-b border-slate-100 p-4">
        <p class="mb-3 text-[11px] font-black uppercase tracking-wider text-slate-400">Thông tin</p>
        <div class="flex items-center gap-3">
          <div id="adminMenuAvatar" class="flex h-12 w-12 shrink-0 items-center justify-center overflow-hidden rounded-full bg-slate-100 text-sm font-black text-slate-600">
            <span class="material-symbols-outlined">admin_panel_settings</span>
          </div>
          <div class="min-w-0">
            <p id="adminMenuName" class="truncate text-base font-black text-slate-950">Admin</p>
            <p id="adminMenuEmail" class="mt-1 truncate text-sm font-semibold text-slate-400">admin</p>
          </div>
        </div>
      </div>

      <div class="border-b border-slate-100 p-2">
        <p class="px-3 py-2 text-[11px] font-black uppercase tracking-wider text-slate-400">Cá nhân</p>
        <button class="admin-dropdown-item" type="button" data-route="settings">
          <span class="material-symbols-outlined">account_circle</span>
          <span>Hồ sơ</span>
        </button>
        <button class="admin-dropdown-item" type="button" data-route="settings">
          <span class="material-symbols-outlined">settings</span>
          <span>Cài đặt</span>
        </button>
        <button id="adminChangePasswordButton" class="admin-dropdown-item" type="button">
          <span class="material-symbols-outlined">lock_reset</span>
          <span>Đổi mật khẩu</span>
        </button>
      </div>

      <div class="border-b border-slate-100 p-2">
        <p class="px-3 py-2 text-[11px] font-black uppercase tracking-wider text-slate-400">Điều hướng quản trị</p>
        <button class="admin-dropdown-item" type="button" data-route="users">
          <span class="material-symbols-outlined">group</span>
          <span>Người dùng</span>
        </button>
        <button class="admin-dropdown-item" type="button" data-route="jobs">
          <span class="material-symbols-outlined">work</span>
          <span>Công việc</span>
        </button>
        <button class="admin-dropdown-item" type="button" data-route="reports">
          <span class="material-symbols-outlined">analytics</span>
          <span>Báo cáo</span>
        </button>
      </div>

      <div class="p-2">
        <button id="adminLogoutButton" class="admin-dropdown-item text-red-600 hover:bg-red-50" type="button">
          <span class="material-symbols-outlined">logout</span>
          <span>Đăng xuất</span>
        </button>
      </div>
    </div>
  </div>
</header>
