<header id="headerEl" class="fixed left-64 right-0 top-0 z-30 flex h-16 items-center justify-between gap-4 border-b border-slate-200 bg-white px-4 shadow-sm transition-all duration-300 sm:px-6">
  <div class="flex min-w-0 flex-1 items-center gap-4">
    <div class="hidden min-w-0 items-center gap-2 sm:flex">
      <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-blue-600 text-white">
        <span class="material-symbols-outlined text-xl">rocket_launch</span>
      </div>
      <p class="truncate text-lg font-black tracking-tight text-slate-950">Smart Job Portal</p>
    </div>

    <label class="relative hidden min-w-0 flex-1 max-w-lg lg:block">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-lg text-slate-400">search</span>
      <input id="headerSearchInput" type="text" placeholder="Tìm kiếm công việc..."
        class="h-10 w-full rounded-lg border border-slate-200 bg-slate-50 pl-10 pr-4 text-sm font-semibold text-slate-700 outline-none transition focus:border-blue-600 focus:bg-white focus:ring-2 focus:ring-blue-600/10" />
    </label>
  </div>

  <div class="relative flex shrink-0 items-center justify-end gap-2">
    <button id="candidateNotificationsButton" class="relative flex h-10 w-10 items-center justify-center rounded-lg text-slate-500 transition-colors hover:bg-slate-50 hover:text-blue-600" type="button" title="Thông báo">
      <span class="material-symbols-outlined text-xl">notifications</span>
      <span id="notifBadge" class="absolute right-2 top-2 hidden h-2.5 w-2.5 rounded-full border-2 border-white bg-red-500"></span>
    </button>

    <div class="relative" id="candidateMenuContainer">
      <button id="candidateMenuBtn" class="flex h-10 min-w-0 items-center gap-2 rounded-lg px-2 transition-colors hover:bg-slate-50" type="button" title="Menu tài khoản" aria-expanded="false">
        <div id="candidateAvatarHeader" class="flex h-9 w-9 shrink-0 items-center justify-center overflow-hidden rounded-full bg-slate-100 text-xs font-black text-slate-600">
          ?
        </div>
        <div class="hidden min-w-0 text-left xl:block">
          <p id="candidateNameHeader" class="max-w-40 truncate text-sm font-black leading-none text-slate-950">...</p>
          <p class="mt-1 max-w-40 truncate text-[11px] font-bold text-slate-400">Ứng viên</p>
        </div>
        <span class="material-symbols-outlined hidden text-xl text-slate-400 sm:block">expand_more</span>
      </button>

      <div id="candidateMenuDropdown" class="hidden absolute right-0 top-12 w-80 max-w-[calc(100vw-2rem)] overflow-hidden rounded-xl border border-slate-200 bg-white shadow-xl shadow-slate-200/70">
        <div class="border-b border-slate-100 p-4">
          <p class="mb-3 text-[11px] font-black uppercase tracking-wider text-slate-400">Thông tin</p>
          <div class="flex items-center gap-3">
            <div id="candidateMenuAvatar" class="flex h-12 w-12 shrink-0 items-center justify-center overflow-hidden rounded-full bg-slate-100 text-sm font-black text-slate-600">
              ?
            </div>
            <div class="min-w-0">
              <p id="candidateDropdownName" class="truncate text-base font-black text-slate-950">...</p>
              <p id="candidateDropdownEmail" class="mt-1 truncate text-sm font-semibold text-slate-400">...</p>
            </div>
          </div>
        </div>

        <div class="border-b border-slate-100 p-2">
          <button class="candidate-dropdown-item" type="button" data-route="profile">
            <span class="material-symbols-outlined">person</span>
            <span>Hồ sơ cá nhân</span>
          </button>
          <button class="candidate-dropdown-item" type="button" data-route="profile-setting">
            <span class="material-symbols-outlined">manage_accounts</span>
            <span>Chỉnh sửa hồ sơ</span>
          </button>
          <button class="candidate-dropdown-item" type="button" data-route="account-setting">
            <span class="material-symbols-outlined">settings</span>
            <span>Cài đặt tài khoản</span>
          </button>
        </div>

        <div class="p-2">
          <button id="candidateLogoutBtn" class="candidate-dropdown-item text-red-600 hover:bg-red-50" type="button">
            <span class="material-symbols-outlined">logout</span>
            <span>Đăng xuất</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
