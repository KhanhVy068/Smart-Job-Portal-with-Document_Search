<header id="headerEl"
  class="fixed top-0 right-0 left-64 z-50 flex justify-between items-center px-6 h-16 bg-white/90 backdrop-blur-xl border-b border-slate-100 transition-all duration-300">

  <!-- Left: Search -->
  <div class="flex items-center gap-4">
    <div class="relative hidden sm:flex items-center">
      <span class="material-symbols-outlined absolute left-3 text-slate-400 text-lg">search</span>
      <input id="headerSearchInput" type="text" placeholder="Tìm kiếm công việc..."
        class="bg-slate-100 border-none rounded-full pl-10 pr-4 py-2 text-sm w-72 focus:ring-2 focus:ring-blue-900/20 focus:outline-none transition-all" />
    </div>
  </div>

  <!-- Right: Actions + User -->
  <div class="flex items-center gap-2">

    <!-- Notifications -->
    <button class="relative p-2 text-slate-500 hover:text-blue-900 hover:bg-slate-100 rounded-full transition-all">
      <span class="material-symbols-outlined text-xl">notifications</span>
      <span id="notifBadge" class="hidden absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
    </button>

    <!-- User Menu -->
    <div class="relative" id="candidateMenuContainer">
      <button id="candidateMenuBtn"
        class="flex items-center gap-2 pl-2 pr-3 py-1.5 hover:bg-slate-100 rounded-full transition-all">
        <div id="candidateAvatarHeader"
          class="w-8 h-8 rounded-full bg-blue-900 text-white flex items-center justify-center text-sm font-bold overflow-hidden flex-shrink-0">
          ?
        </div>
        <span id="candidateNameHeader"
          class="text-sm font-semibold text-slate-700 hidden sm:block max-w-[120px] truncate">...</span>
        <span class="material-symbols-outlined text-slate-400 text-lg">expand_more</span>
      </button>

      <!-- Dropdown -->
      <div id="candidateMenuDropdown"
        class="hidden absolute right-0 top-full mt-2 w-56 bg-white rounded-xl shadow-xl border border-slate-100 overflow-hidden z-50">
        <div class="p-4 border-b border-slate-100 bg-slate-50">
          <p id="candidateDropdownName" class="font-bold text-sm text-slate-900 truncate">...</p>
          <p id="candidateDropdownEmail" class="text-xs text-slate-500 truncate mt-0.5">...</p>
        </div>
        <div class="p-2">
          <a data-route="profile"
            class="flex items-center gap-3 px-3 py-2 text-sm text-slate-700 hover:bg-slate-100 rounded-lg cursor-pointer transition-colors">
            <span class="material-symbols-outlined text-base text-slate-500">person</span>
            Hồ sơ cá nhân
          </a>
          <a data-route="profile-setting"
            class="flex items-center gap-3 px-3 py-2 text-sm text-slate-700 hover:bg-slate-100 rounded-lg cursor-pointer transition-colors">
            <span class="material-symbols-outlined text-base text-slate-500">manage_accounts</span>
            Chỉnh sửa hồ sơ
          </a>
          <a data-route="account-setting"
            class="flex items-center gap-3 px-3 py-2 text-sm text-slate-700 hover:bg-slate-100 rounded-lg cursor-pointer transition-colors">
            <span class="material-symbols-outlined text-base text-slate-500">settings</span>
            Cài đặt tài khoản
          </a>
          <hr class="my-2 border-slate-100" />
          <button id="candidateLogoutBtn"
            class="w-full flex items-center gap-3 px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors">
            <span class="material-symbols-outlined text-base">logout</span>
            Đăng xuất
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
