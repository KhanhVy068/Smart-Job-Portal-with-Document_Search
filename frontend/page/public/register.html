<section class="bg-slate-50 px-4 py-8 sm:px-6">
  <style>
    .form-input {
      height: 3rem;
      width: 100%;
      border-radius: 0.5rem;
      border: 1px solid #e2e8f0;
      padding: 0 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      outline: none;
      background: white;
    }
    .form-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px #dbeafe;
    }
    textarea.form-input {
      height: auto;
      padding-top: 0.75rem;
      padding-bottom: 0.75rem;
    }
  </style>
  <form id="publicRegisterForm" class="mx-auto max-w-6xl rounded-lg border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
    <div class="mb-6 flex flex-col gap-4 border-b border-slate-200 pb-6 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h1 class="text-3xl font-black text-slate-950">Đăng ký tài khoản</h1>
        <p class="mt-2 text-sm font-semibold text-slate-500">Tạo tài khoản thật để đăng nhập vào đúng không gian làm việc của bạn.</p>
      </div>
      <a class="inline-flex h-11 items-center justify-center rounded-lg border border-slate-200 px-4 text-sm font-black text-slate-700 hover:bg-slate-50" href="#login" data-route="login">Đăng nhập</a>
    </div>

    <p class="text-xs font-black uppercase tracking-wider text-slate-500">Vai trò</p>
    <div class="mt-3 grid gap-3 sm:grid-cols-2">
      <button class="register-role rounded-lg border border-blue-600 bg-blue-50 p-4 text-center font-black text-blue-700" type="button" data-role="candidate">
        <span class="material-symbols-outlined block text-2xl">person</span>
        Ứng viên
      </button>
      <button class="register-role rounded-lg border border-slate-200 p-4 text-center font-black text-slate-700" type="button" data-role="employer">
        <span class="material-symbols-outlined block text-2xl">business</span>
        Nhà tuyển dụng
      </button>
    </div>

    <section class="mt-8 rounded-lg border border-slate-200 p-5">
      <h2 class="text-lg font-black text-slate-950">1. Thông tin tài khoản</h2>
      <div class="mt-5 grid gap-4 md:grid-cols-2">
        <label class="space-y-2"><span class="text-xs font-black uppercase tracking-wider text-slate-500">Họ và tên</span><input id="publicRegisterName" class="form-input" placeholder="Nguyễn Văn A" required></label>
        <label class="space-y-2"><span class="text-xs font-black uppercase tracking-wider text-slate-500">Email</span><input id="publicRegisterEmail" class="form-input" type="email" placeholder="email@example.com" required></label>
        <label class="space-y-2"><span class="text-xs font-black uppercase tracking-wider text-slate-500">Số điện thoại</span><input id="publicRegisterPhone" class="form-input" placeholder="0901234567" required></label>
        <div></div>
        <label class="space-y-2">
          <span class="text-xs font-black uppercase tracking-wider text-slate-500">Mật khẩu</span>
          <div class="relative">
            <input id="publicRegisterPassword" class="form-input pr-12" type="password" required>
            <button class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-slate-400" type="button" data-target="publicRegisterPassword"><span class="material-symbols-outlined">visibility</span></button>
          </div>
        </label>
        <label class="space-y-2">
          <span class="text-xs font-black uppercase tracking-wider text-slate-500">Xác nhận mật khẩu</span>
          <div class="relative">
            <input id="publicRegisterConfirm" class="form-input pr-12" type="password" required>
            <button class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-slate-400" type="button" data-target="publicRegisterConfirm"><span class="material-symbols-outlined">visibility</span></button>
          </div>
        </label>
      </div>
      <p class="mt-3 text-xs font-semibold text-slate-400">Mật khẩu nên có ít nhất 8 ký tự, gồm chữ hoa, chữ thường và số.</p>
    </section>

    <section id="employerCompanySection" class="mt-6 hidden rounded-lg border border-slate-200 p-5">
      <h2 class="text-lg font-black text-slate-950">2. Thông tin công ty</h2>
      <div class="mt-5 grid gap-4 md:grid-cols-2">
        <label class="space-y-2"><span class="text-xs font-black uppercase tracking-wider text-slate-500">Tên công ty</span><input id="companyNameInput" class="form-input"></label>
        <label class="space-y-2"><span class="text-xs font-black uppercase tracking-wider text-slate-500">Website công ty</span><input id="companyWebsiteInput" class="form-input" placeholder="https://example.com"></label>
        <label class="space-y-2"><span class="text-xs font-black uppercase tracking-wider text-slate-500">Lĩnh vực hoạt động</span><input id="companyIndustryInput" class="form-input" placeholder="Software, HR Tech..."></label>
        <label class="space-y-2"><span class="text-xs font-black uppercase tracking-wider text-slate-500">Quy mô công ty</span><select id="companySizeInput" class="form-input"><option value="">Chọn quy mô</option><option>1-10</option><option>11-50</option><option>51-200</option><option>201-500</option><option>500+</option></select></label>
        <label class="space-y-2 md:col-span-2"><span class="text-xs font-black uppercase tracking-wider text-slate-500">Địa chỉ công ty</span><input id="companyAddressInput" class="form-input"></label>
        <label class="space-y-2 md:col-span-2"><span class="text-xs font-black uppercase tracking-wider text-slate-500">Mô tả công ty</span><textarea id="companyDescriptionInput" class="form-input min-h-28 py-3" placeholder="Giới thiệu ngắn về công ty"></textarea></label>
        <label class="space-y-2 md:col-span-2">
          <span class="text-xs font-black uppercase tracking-wider text-slate-500">Logo công ty</span>
          <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
            <input id="companyLogoInput" class="form-input" type="file" accept="image/png,image/jpeg,image/webp">
            <img id="companyLogoPreview" class="hidden h-16 w-16 rounded-lg border border-slate-200 object-cover" alt="Preview logo">
          </div>
        </label>
      </div>
    </section>

    <section id="employerVerifySection" class="mt-6 hidden rounded-lg border border-slate-200 p-5">
      <h2 class="text-lg font-black text-slate-950">3. Xác thực doanh nghiệp <span class="text-sm font-bold text-slate-400">(nếu có)</span></h2>
      <div class="mt-5 grid gap-4 md:grid-cols-2">
        <label class="space-y-2"><span class="text-xs font-black uppercase tracking-wider text-slate-500">Mã số thuế</span><input id="taxCodeInput" class="form-input"></label>
        <label class="space-y-2"><span class="text-xs font-black uppercase tracking-wider text-slate-500">Email công ty</span><input id="companyEmailInput" class="form-input" type="email"></label>
        <label class="space-y-2 md:col-span-2"><span class="text-xs font-black uppercase tracking-wider text-slate-500">Giấy phép kinh doanh</span><input id="businessLicenseInput" class="form-input" type="file" accept=".pdf,image/png,image/jpeg,image/webp"></label>
      </div>
    </section>

    <section class="mt-6 rounded-lg border border-slate-200 p-5">
      <h2 class="text-lg font-black text-slate-950">4. Điều khoản</h2>
      <label class="mt-4 flex items-start gap-3 text-sm font-semibold text-slate-600"><input id="publicRegisterTerms" class="mt-1 h-5 w-5 rounded border-slate-300" type="checkbox" required>Tôi đồng ý với điều khoản sử dụng.</label>
      <label class="mt-3 flex items-start gap-3 text-sm font-semibold text-slate-600"><input id="publicRegisterPrivacy" class="mt-1 h-5 w-5 rounded border-slate-300" type="checkbox" required>Tôi đồng ý với chính sách bảo mật.</label>
    </section>

    <p id="publicRegisterMessage" class="mt-5 min-h-5 text-sm font-bold text-red-600"></p>
    <div class="mt-4 grid gap-3 sm:grid-cols-[1fr_auto_auto]">
      <button id="publicRegisterSubmit" class="h-12 rounded-lg bg-blue-600 px-6 text-sm font-black text-white shadow-sm hover:bg-blue-700" type="submit">Đăng ký</button>
      <button id="googleRegisterButton" class="h-12 rounded-lg border border-slate-200 px-6 text-sm font-black text-slate-700 hover:bg-slate-50" type="button">Đăng ký bằng Google</button>
      <a class="inline-flex h-12 items-center justify-center rounded-lg border border-slate-200 px-6 text-sm font-black text-slate-700 hover:bg-slate-50" href="#login" data-route="login">Đăng nhập</a>
    </div>
  </form>
  <div id="publicToast" class="fixed bottom-5 right-5 z-50 hidden rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm font-bold shadow-xl"></div>
</section>
