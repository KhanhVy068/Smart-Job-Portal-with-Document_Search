<section class="bg-slate-50 px-4 py-10 sm:px-6">
  <form id="publicForgotForm" class="mx-auto max-w-xl rounded-lg border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
    <div class="flex h-12 w-12 items-center justify-center rounded-lg bg-blue-50 text-blue-600">
      <span class="material-symbols-outlined text-2xl">lock_reset</span>
    </div>
    <p class="mt-6 text-xs font-black uppercase tracking-wider text-slate-400">Bảo mật tài khoản</p>
    <h1 class="mt-2 text-3xl font-black text-slate-950">Quên mật khẩu?</h1>
    <p class="mt-3 text-sm font-semibold leading-7 text-slate-500">Nhập email của bạn để tạo yêu cầu đặt lại mật khẩu.</p>
    <label class="mt-6 block space-y-2">
      <span class="text-xs font-black uppercase tracking-wider text-slate-500">Email</span>
      <input id="publicForgotEmail" class="h-12 w-full rounded-lg border border-slate-200 px-4 text-sm font-semibold outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100" type="email" placeholder="name@company.com" required>
    </label>
    <p id="publicForgotMessage" class="mt-4 min-h-5 text-sm font-bold"></p>
    <button id="publicForgotSubmit" class="mt-2 h-12 w-full rounded-lg bg-blue-600 text-sm font-black text-white shadow-sm hover:bg-blue-700" type="submit">Gửi liên kết đặt lại</button>
    <div class="mt-6 border-t border-slate-200 pt-5 text-center">
      <a class="inline-flex items-center gap-2 text-sm font-black text-blue-600" href="#login" data-route="login"><span class="material-symbols-outlined text-base">arrow_back</span>Quay lại đăng nhập</a>
    </div>
  </form>
</section>
