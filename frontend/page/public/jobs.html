<section class="bg-slate-50">
  <div class="mx-auto max-w-7xl px-4 py-10 sm:px-6">
    <div class="mb-8">
      <p class="text-xs font-black uppercase tracking-[0.3em] text-blue-700">Find jobs</p>
      <h1 class="mt-3 text-4xl font-black text-blue-950">Danh sách công việc</h1>
      <p class="mt-3 max-w-2xl text-sm font-semibold leading-6 text-slate-500">Tìm kiếm việc làm giống ứng viên, nhưng không cần đăng nhập để xem danh sách và chi tiết.</p>
    </div>

    <div class="grid gap-6 lg:grid-cols-[280px_1fr]">
      <aside class="h-fit rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
        <label class="block">
          <span class="text-xs font-black uppercase tracking-wider text-slate-500">Từ khóa</span>
          <input id="publicJobKeyword" class="mt-2 h-11 w-full rounded-lg border border-slate-200 px-3 text-sm font-semibold outline-none focus:border-blue-700" type="search" placeholder="Node, React, Backend">
        </label>
        <label class="mt-4 block">
          <span class="text-xs font-black uppercase tracking-wider text-slate-500">Địa điểm</span>
          <input id="publicJobLocation" class="mt-2 h-11 w-full rounded-lg border border-slate-200 px-3 text-sm font-semibold outline-none focus:border-blue-700" type="search" placeholder="Remote, Hà Nội">
        </label>
        <label class="mt-4 block">
          <span class="text-xs font-black uppercase tracking-wider text-slate-500">Loại hình</span>
          <select id="publicJobType" class="mt-2 h-11 w-full rounded-lg border border-slate-200 px-3 text-sm font-semibold outline-none focus:border-blue-700">
            <option value="">Tất cả</option>
            <option value="Full-time">Full-time</option>
            <option value="Part-time">Part-time</option>
            <option value="Freelance">Freelance</option>
            <option value="Remote">Remote</option>
          </select>
        </label>
        <button id="publicApplyFilter" class="mt-5 h-11 w-full rounded-lg bg-blue-900 text-sm font-black text-white">Áp dụng</button>
        <button id="publicClearFilter" class="mt-3 h-11 w-full rounded-lg border border-slate-200 text-sm font-black text-slate-600">Xóa lọc</button>
      </aside>

      <main>
        <div class="mb-4 flex items-center justify-between gap-4">
          <p id="publicJobCount" class="text-sm font-bold text-slate-500">Đang tải...</p>
          <a class="text-sm font-black text-blue-950 hover:underline" href="#register" data-route="register">Tạo tài khoản để ứng tuyển</a>
        </div>
        <div id="publicJobList" class="space-y-4"></div>
        <div id="publicPagination" class="mt-8 flex justify-center gap-2"></div>
      </main>
    </div>
  </div>
</section>
