<!-- Candidate CV Management -->
<section class="p-6 space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-blue-900">Quản lý CV</h1>
      <p id="cvMgmtCount" class="text-sm text-slate-500 mt-1">Đang tải...</p>
    </div>
    <button data-route="cv-upload"
      class="flex items-center gap-2 px-4 py-2.5 bg-blue-900 text-white text-sm font-bold rounded-xl hover:bg-blue-800 active:scale-95 transition-all shadow-md">
      <span class="material-symbols-outlined text-base">upload_file</span> Upload CV mới
    </button>
  </div>

  <!-- Empty state -->
  <div id="cvMgmtEmpty" class="hidden flex flex-col items-center justify-center py-20 text-center">
    <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mb-4">
      <span class="material-symbols-outlined text-3xl text-slate-400">description</span>
    </div>
    <h3 class="text-base font-bold text-slate-600 mb-2">Chưa có CV nào</h3>
    <p class="text-sm text-slate-400 mb-6">Upload CV đầu tiên để bắt đầu ứng tuyển.</p>
    <button data-route="cv-upload" class="px-6 py-2.5 bg-blue-900 text-white font-bold rounded-xl text-sm hover:bg-blue-800 transition-all">
      Upload CV ngay
    </button>
  </div>

  <!-- CV grid -->
  <div id="cvMgmtList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    <div class="bg-white border border-slate-100 rounded-xl p-5 animate-pulse h-48"></div>
    <div class="bg-white border border-slate-100 rounded-xl p-5 animate-pulse h-48"></div>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="cvDeleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 space-y-5 text-center">
      <div class="w-14 h-14 bg-red-50 rounded-2xl flex items-center justify-center mx-auto">
        <span class="material-symbols-outlined text-red-500 text-3xl">delete_forever</span>
      </div>
      <div>
        <h2 class="text-lg font-bold text-slate-800 mb-1">Xoá CV này?</h2>
        <p id="cvDeleteName" class="text-sm text-slate-500"></p>
      </div>
      <p class="text-xs text-slate-400">Hành động này không thể hoàn tác.</p>
      <div class="flex gap-3">
        <button id="cvDeleteCancel" class="flex-1 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-all">Hủy</button>
        <button id="cvDeleteConfirm" class="flex-1 py-2.5 bg-red-600 text-white rounded-xl text-sm font-bold hover:bg-red-700 active:scale-95 transition-all">Xoá</button>
      </div>
    </div>
  </div>
</section>
