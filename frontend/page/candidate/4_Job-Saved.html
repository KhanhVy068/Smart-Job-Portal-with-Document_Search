<!-- Candidate Job Saved -->
<section class="p-6 space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-blue-900">Việc làm đã lưu</h1>
      <p id="savedCount" class="text-sm text-slate-500 mt-1">Đang tải...</p>
    </div>
    <button data-route="job-list"
      class="flex items-center gap-2 px-4 py-2 bg-blue-900 text-white text-sm font-bold rounded-xl hover:bg-blue-800 active:scale-95 transition-all">
      <span class="material-symbols-outlined text-base">search</span> Tìm thêm việc
    </button>
  </div>

  <!-- Empty state -->
  <div id="savedEmpty" class="hidden flex flex-col items-center justify-center py-20 text-center">
    <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mb-4">
      <span class="material-symbols-outlined text-3xl text-slate-400">bookmark_border</span>
    </div>
    <h3 class="text-base font-bold text-slate-600 mb-2">Chưa có việc làm nào được lưu</h3>
    <p class="text-sm text-slate-400 mb-6">Nhấn biểu tượng bookmark khi xem việc làm để lưu lại.</p>
    <button data-route="job-list" class="px-6 py-2.5 bg-blue-900 text-white font-bold rounded-xl text-sm hover:bg-blue-800 transition-all">
      Khám phá việc làm
    </button>
  </div>

  <!-- Job list -->
  <div id="savedJobList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    <div class="bg-white border border-slate-100 rounded-xl p-5 animate-pulse h-44"></div>
    <div class="bg-white border border-slate-100 rounded-xl p-5 animate-pulse h-44"></div>
    <div class="bg-white border border-slate-100 rounded-xl p-5 animate-pulse h-44"></div>
  </div>
</section>
