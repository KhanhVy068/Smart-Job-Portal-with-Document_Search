<!-- Candidate Profile Setting -->
<section class="p-6 space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-blue-900">Chỉnh sửa hồ sơ</h1>
      <p class="text-sm text-slate-500 mt-1">Cập nhật thông tin để tăng khả năng được tìm thấy.</p>
    </div>
    <button data-route="profile" class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl transition-all">
      <span class="material-symbols-outlined text-base">arrow_back</span> Xem hồ sơ
    </button>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2 space-y-5">

      <!-- Avatar -->
      <div class="bg-white border border-slate-100 rounded-xl p-6 shadow-sm">
        <h2 class="text-sm font-bold text-blue-900 uppercase tracking-wide mb-4">Ảnh đại diện</h2>
        <div class="flex items-center gap-5">
          <div id="psAvatarPreview"
            class="w-20 h-20 rounded-2xl bg-blue-900 text-white flex items-center justify-center text-2xl font-black overflow-hidden flex-shrink-0">
            ?
          </div>
          <div class="space-y-2">
            <input id="psAvatarInput" type="file" accept="image/*" class="hidden" />
            <button id="psAvatarBtn"
              class="px-4 py-2 bg-slate-100 text-slate-700 text-sm font-semibold rounded-xl hover:bg-slate-200 transition-all">
              Chọn ảnh mới
            </button>
            <p class="text-xs text-slate-400">JPG, PNG · Tối đa 2MB</p>
          </div>
        </div>
      </div>

      <!-- Basic Info -->
      <div class="bg-white border border-slate-100 rounded-xl p-6 shadow-sm space-y-5">
        <h2 class="text-sm font-bold text-blue-900 uppercase tracking-wide">Thông tin cơ bản</h2>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="space-y-1.5">
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Họ tên <span class="text-red-500">*</span></label>
            <input id="psFullName" type="text" placeholder="Nguyễn Văn A"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 px-4 text-sm focus:ring-2 focus:ring-blue-900/20 focus:outline-none focus:border-blue-900/30 transition-all" />
          </div>
          <div class="space-y-1.5">
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Số điện thoại</label>
            <input id="psPhone" type="tel" placeholder="090 123 4567"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 px-4 text-sm focus:ring-2 focus:ring-blue-900/20 focus:outline-none focus:border-blue-900/30 transition-all" />
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Chức danh nghề nghiệp</label>
          <input id="psTitle" type="text" placeholder="VD: Senior Frontend Developer"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 px-4 text-sm focus:ring-2 focus:ring-blue-900/20 focus:outline-none focus:border-blue-900/30 transition-all" />
        </div>

        <div class="space-y-1.5">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Địa điểm</label>
          <input id="psLocation" type="text" placeholder="VD: TP. Hồ Chí Minh"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 px-4 text-sm focus:ring-2 focus:ring-blue-900/20 focus:outline-none focus:border-blue-900/30 transition-all" />
        </div>

        <div class="space-y-1.5">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Giới thiệu bản thân</label>
          <textarea id="psBio" rows="4" placeholder="Giới thiệu ngắn về kinh nghiệm và mục tiêu nghề nghiệp..."
            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 px-4 text-sm focus:ring-2 focus:ring-blue-900/20 focus:outline-none focus:border-blue-900/30 transition-all resize-none"></textarea>
        </div>
      </div>

      <!-- Professional Info -->
      <div class="bg-white border border-slate-100 rounded-xl p-6 shadow-sm space-y-5">
        <h2 class="text-sm font-bold text-blue-900 uppercase tracking-wide">Thông tin chuyên môn</h2>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="space-y-1.5">
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Số năm kinh nghiệm</label>
            <select id="psExperience"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 px-4 text-sm focus:ring-2 focus:ring-blue-900/20 focus:outline-none">
              <option value="">Chọn kinh nghiệm</option>
              <option value="0">Chưa có kinh nghiệm</option>
              <option value="1">Dưới 1 năm</option>
              <option value="2">1 – 2 năm</option>
              <option value="3">2 – 3 năm</option>
              <option value="5">3 – 5 năm</option>
              <option value="7">5 – 7 năm</option>
              <option value="10">Trên 7 năm</option>
            </select>
          </div>
          <div class="space-y-1.5">
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Học vấn</label>
            <input id="psEducation" type="text" placeholder="VD: Đại học Bách Khoa – CNTT"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 px-4 text-sm focus:ring-2 focus:ring-blue-900/20 focus:outline-none transition-all" />
          </div>
        </div>

        <!-- Skills -->
        <div class="space-y-1.5">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Kỹ năng</label>
          <div class="flex gap-2">
            <input id="psSkillInput" type="text" placeholder="Nhập kỹ năng rồi nhấn Enter..."
              class="flex-1 bg-slate-50 border border-slate-200 rounded-xl py-2.5 px-4 text-sm focus:ring-2 focus:ring-blue-900/20 focus:outline-none transition-all" />
            <button id="psSkillAdd"
              class="px-4 py-2.5 bg-blue-900 text-white text-sm font-bold rounded-xl hover:bg-blue-800 transition-all">
              Thêm
            </button>
          </div>
          <div id="psSkillTags" class="flex flex-wrap gap-2 mt-2"></div>
        </div>
      </div>

      <!-- Alert messages -->
      <div id="psSuccess" class="hidden flex items-center gap-3 p-4 bg-teal-50 border border-teal-200 rounded-xl text-teal-700 text-sm font-semibold">
        <span class="material-symbols-outlined">check_circle</span> Cập nhật hồ sơ thành công!
      </div>
      <div id="psError" class="hidden flex items-center gap-3 p-4 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm font-semibold">
        <span class="material-symbols-outlined">error</span> <span id="psErrorMsg"></span>
      </div>

      <!-- Actions -->
      <div class="flex gap-3 pb-4">
        <button data-route="profile"
          class="flex-1 py-3 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-all">
          Hủy
        </button>
        <button id="psSaveBtn"
          class="flex-1 py-3 bg-blue-900 text-white font-bold rounded-xl text-sm hover:bg-blue-800 active:scale-95 transition-all shadow-md">
          Lưu thay đổi
        </button>
      </div>
    </div>

    <!-- Right tips -->
    <div class="space-y-4">
      <div class="bg-white border border-slate-100 rounded-xl p-6 shadow-sm space-y-4">
        <h3 class="text-sm font-bold text-blue-900">Gợi ý hoàn thiện hồ sơ</h3>
        <div id="psTipsContainer" class="space-y-3 text-sm text-slate-600"></div>
      </div>
    </div>
  </div>
</section>
