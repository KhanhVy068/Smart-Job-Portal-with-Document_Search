version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: job_portal_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: job_portal
      MYSQL_USER: job_user
      MYSQL_PASSWORD: job_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/db.sql:/docker-entrypoint-initdb.d/01-db.sql:ro

  redis:
    image: redis:7-alpine
    container_name: job_portal_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: job_portal_meilisearch
    restart: always
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: meili_key
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

volumes:
  mysql_data:
  redis_data:
  meili_data:
